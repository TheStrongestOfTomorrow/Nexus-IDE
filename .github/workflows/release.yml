name: Desktop Releases
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Generate Placeholder Icons (if missing)
        run: |
          mkdir -p src-tauri/icons
          # Create a dummy 32x32 png if it doesn't exist
          if [ ! -f src-tauri/icons/32x32.png ]; then
            echo "Creating placeholder icons..."
            touch src-tauri/icons/32x32.png
            touch src-tauri/icons/128x128.png
            touch src-tauri/icons/128x128@2x.png
            touch src-tauri/icons/icon.icns
            touch src-tauri/icons/icon.ico
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || 'latest' }}
          releaseName: "Nexus IDE ${{ github.ref_name || 'Latest Build' }}"
          releaseBody: "Automated build of Nexus IDE v4.3"
          releaseDraft: true
          prerelease: false
          distDir: ../dist
