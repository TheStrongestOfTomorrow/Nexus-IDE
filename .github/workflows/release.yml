name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__ # This will be replaced with the version from package.json
          releaseName: 'Nexus IDE v__VERSION__'
          releaseBody: 'See the release notes for more information.'
          releaseDraft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
