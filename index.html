<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007acc" />
    <link rel="manifest" href="manifest.json" />
    <title>Nexus IDE</title>
    <script>
      // Cache busting for new versions
      const CURRENT_VERSION = '4.3.6';
      if (localStorage.getItem('nexus_version') !== CURRENT_VERSION) {
        localStorage.setItem('nexus_version', CURRENT_VERSION);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) { registrations.unregister(); }
          });
        }
        window.location.reload(true);
      }
    </script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('Nexus SW registered');
          }).catch(err => {
            console.log('Nexus SW registration failed', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
